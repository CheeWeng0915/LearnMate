name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

  workflow_dispatch:

env:
  PROJECT_ID: learnmate-494807
  REGION: asia-southeast1
  SERVICE_NAME: learnmate-backend
  REPOSITORY: learnmate-repo
  IMAGE_NAME: learnmate-backend
  MONGODB_DB_NAME: LearnMateDatabase
  MONGODB_SERVER_SELECTION_TIMEOUT_MS: "5000"
  JWT_ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  GEMINI_MODEL: gemini-2.0-flash
  FRONTEND_RUNTIME_SERVICE_ACCOUNT: learnmate-frontend-runtime@learnmate-494807.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/855397868650/locations/global/workloadIdentityPools/github/providers/github-provider
  SERVICE_ACCOUNT: github-actions-deployer@learnmate-494807.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Validate required backend secrets
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          missing=0
          for key in MONGODB_URI JWT_SECRET_KEY GEMINI_API_KEY YOUTUBE_API_KEY TURNSTILE_SECRET_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub secret: ${key}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ./backend

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          trap 'rm -f backend-env.yaml' EXIT

          cat > backend-env.yaml <<EOF
          MONGODB_DB_NAME: "${{ env.MONGODB_DB_NAME }}"
          MONGODB_SERVER_SELECTION_TIMEOUT_MS: "${{ env.MONGODB_SERVER_SELECTION_TIMEOUT_MS }}"
          JWT_ALGORITHM: "${{ env.JWT_ALGORITHM }}"
          ACCESS_TOKEN_EXPIRE_MINUTES: "${{ env.ACCESS_TOKEN_EXPIRE_MINUTES }}"
          REFRESH_TOKEN_EXPIRE_DAYS: "${{ env.REFRESH_TOKEN_EXPIRE_DAYS }}"
          GEMINI_MODEL: "${{ env.GEMINI_MODEL }}"
          MONGODB_URI: "${MONGODB_URI}"
          JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
          GEMINI_API_KEY: "${GEMINI_API_KEY}"
          YOUTUBE_API_KEY: "${YOUTUBE_API_KEY}"
          TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY}"
          EOF

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --no-allow-unauthenticated \
            --clear-secrets \
            --env-vars-file backend-env.yaml \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1

      - name: Allow frontend to invoke backend
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --member serviceAccount:${{ env.FRONTEND_RUNTIME_SERVICE_ACCOUNT }} \
            --role roles/run.invoker
