name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

  workflow_dispatch:

env:
  PROJECT_ID: learnmate-494807
  REGION: asia-southeast1
  SERVICE_NAME: learnmate-frontend
  REPOSITORY: learnmate-repo
  IMAGE_NAME: learnmate-frontend
  BACKEND_API_URL: https://learnmate-backend-855397868650.asia-southeast1.run.app
  FRONTEND_RUNTIME_SERVICE_ACCOUNT: learnmate-frontend-runtime@learnmate-494807.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/855397868650/locations/global/workloadIdentityPools/github/providers/github-provider
  SERVICE_ACCOUNT: github-actions-deployer@learnmate-494807.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ./frontend

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account ${{ env.FRONTEND_RUNTIME_SERVICE_ACCOUNT }} \
            --set-env-vars BACKEND_API_URL=${{ env.BACKEND_API_URL }},BACKEND_ID_TOKEN_AUDIENCE=${{ env.BACKEND_API_URL }},NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }} \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1
